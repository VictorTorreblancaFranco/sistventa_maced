services:
  - type: web
    name: sistventa-maced-backend
    env: docker
    rootDir: backend
    plan: free
    autoDeploy: true
    envVars:
      - key: JDBC_DATABASE_URL
        sync: false
      - key: DATABASE_USERNAME
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: TOKEN_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        sync: false
